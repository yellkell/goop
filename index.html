<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Fire Fight</title>
    <link rel="icon" type="image/png" href="/firefightfavicon.png" />
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #14151c;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #scene-container {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        background:
          radial-gradient(circle at 72% 28%, rgba(229, 63, 26, 0.24), transparent 34rem),
          linear-gradient(135deg, #07080b 0%, #13151a 52%, #22100b 100%);
      }
      .landing {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: grid;
        align-items: center;
        padding: clamp(24px, 7vw, 96px);
        box-sizing: border-box;
        color: #f4efe8;
        background:
          linear-gradient(90deg, rgba(4, 5, 8, 0.94) 0%, rgba(4, 5, 8, 0.72) 48%, rgba(4, 5, 8, 0.24) 100%),
          linear-gradient(180deg, rgba(230, 68, 26, 0.22) 0%, rgba(230, 68, 26, 0) 44%);
        transition:
          opacity 220ms ease,
          visibility 220ms ease;
      }
      .landing::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px),
          linear-gradient(180deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
        background-size: 72px 72px;
        mask-image: linear-gradient(90deg, rgba(0, 0, 0, 0.72), transparent 68%);
      }
      .landing__content {
        position: relative;
        z-index: 1;
        max-width: 640px;
      }
      .landing__eyebrow {
        margin: 0 0 34px;
        color: #ff8b52;
        font-size: clamp(3.4rem, 9vw, 8rem);
        font-weight: 800;
        line-height: 0.9;
        letter-spacing: 0;
        text-transform: uppercase;
      }
      .landing__subtitle {
        margin: -20px 0 34px;
        color: rgba(244, 239, 232, 0.82);
        font-size: clamp(1.15rem, 2.7vw, 2rem);
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      .enter-vr {
        width: min(100%, 280px);
        min-height: 68px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        box-sizing: border-box;
        padding: 0 34px;
        color: #120906;
        background: linear-gradient(180deg, #ffb35c 0%, #f25b24 100%);
        box-shadow:
          0 18px 48px rgba(242, 91, 36, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.5);
        cursor: pointer;
        font: 900 1.08rem/1 system-ui, -apple-system, sans-serif;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      .enter-vr:hover,
      .enter-vr:focus-visible {
        transform: translateY(-1px);
        box-shadow:
          0 24px 58px rgba(242, 91, 36, 0.34),
          inset 0 1px 0 rgba(255, 255, 255, 0.56);
      }
      .enter-vr:focus-visible {
        outline: 3px solid rgba(255, 255, 255, 0.78);
        outline-offset: 4px;
      }
      .enter-vr:disabled {
        cursor: wait;
        opacity: 0.72;
        transform: none;
      }
      body.app-entered .landing {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      @media (max-width: 700px) {
        .landing {
          align-items: end;
        }
        .landing__eyebrow {
          font-size: clamp(2.6rem, 17vw, 4.8rem);
        }
        .landing__subtitle {
          margin-top: -18px;
          font-size: clamp(0.95rem, 5vw, 1.25rem);
        }
        .enter-vr {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="scene-container"></div>
    <section class="landing" id="landing" aria-labelledby="landing-title">
      <main class="landing__content">
        <h1 class="landing__eyebrow" id="landing-title">Fire Fight</h1>
        <p class="landing__subtitle">Iron Balls Boxing</p>
        <button class="enter-vr" id="enter-vr" type="button">Enter VR</button>
      </main>
    </section>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
