<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>GOOP</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #0a120b;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #scene-container {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        background:
          radial-gradient(circle at 70% 30%, rgba(70, 220, 90, 0.18), transparent 34rem),
          linear-gradient(135deg, #060a06 0%, #0b140c 55%, #10240f 100%);
      }
      .landing {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: grid;
        place-items: center;
        padding: clamp(24px, 7vw, 96px);
        box-sizing: border-box;
        color: #eef7ea;
        /* Fully opaque so the web screen shows ONLY the wordmark and the
           button — nothing of the 3D scene bleeds through until you're in VR. */
        background:
          radial-gradient(ellipse at 50% 42%, rgba(74, 222, 96, 0.16) 0%, rgba(74, 222, 96, 0) 46%),
          radial-gradient(ellipse at 50% 46%, #0d1c0e 0%, #060a06 72%),
          #060a06;
        transition:
          opacity 220ms ease,
          visibility 220ms ease;
      }
      /* A slow ooze of blob shadows drifting behind the copy. */
      .landing::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(ellipse 34rem 22rem at 82% 78%, rgba(84, 240, 110, 0.10), transparent 70%),
          radial-gradient(ellipse 22rem 30rem at 88% 26%, rgba(84, 240, 110, 0.07), transparent 70%);
        animation: ooze 9s ease-in-out infinite alternate;
      }
      @keyframes ooze {
        from {
          transform: translateY(-1.5%) scale(1);
        }
        to {
          transform: translateY(2.5%) scale(1.06);
        }
      }
      .landing__content {
        position: relative;
        z-index: 1;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 46px;
      }
      .landing__logo {
        width: min(78vw, 620px);
        height: auto;
        filter: drop-shadow(0 0 46px rgba(96, 255, 120, 0.35));
      }
      .enter-vr {
        width: min(100%, 300px);
        padding: 18px 22px;
        border: 1px solid rgba(109, 255, 126, 0.55);
        border-radius: 14px;
        background: linear-gradient(180deg, rgba(46, 160, 62, 0.85), rgba(24, 96, 36, 0.9));
        color: #f2fff0;
        font-size: 1.15rem;
        font-weight: 800;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: pointer;
        transition:
          transform 120ms ease,
          box-shadow 120ms ease;
        box-shadow: 0 6px 34px rgba(74, 222, 96, 0.25);
      }
      .enter-vr:hover:not([disabled]) {
        transform: translateY(-2px);
        box-shadow: 0 10px 44px rgba(74, 222, 96, 0.4);
      }
      .enter-vr[disabled] {
        opacity: 0.45;
        cursor: default;
      }
      body.app-entered .landing {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="scene-container"></div>
    <div class="landing">
      <div class="landing__content">
        <img class="landing__logo" id="landing-logo" alt="GOOP" />
        <button id="enter-vr" class="enter-vr" type="button">Enter VR</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
